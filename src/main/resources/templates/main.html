<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>이벤터스 행사 솔루션 - 메인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background-color: #000; }

        .bg-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1610991136531-bc470ee643ec?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; z-index: 1; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .split-container { position: relative; width: 100%; height: 100%; display: flex; z-index: 10; }

      
        .divider {
            position: absolute; 
            top: 10%; 
            left: 50%; 
            width: 2px; 
            height: 80%; 
            background-color: rgba(255, 255, 255, 0.5); 
            z-index: 20; 
            pointer-events: none;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .split-panel {
            flex: 1; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; 
            cursor: pointer; text-decoration: none; transition: all 0.5s ease;
        }

        .split-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.2); transition: all 0.5s ease; z-index: 2;
        }
        .split-panel:hover::before { background-color: rgba(0, 0, 0, 0.65); backdrop-filter: blur(4px); }

        .panel-content { position: relative; z-index: 5; text-align: center; color: #fff; }

        .hover-reveal-box {
            opacity: 0; transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .split-panel:hover .hover-reveal-box { opacity: 1; transform: translateY(0); }

        .panel-title { font-size: 42px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .panel-desc { font-size: 15px; color: #e2e8f0; font-weight: 300; margin-bottom: 24px; }
        
        .action-circle-btn {
            width: 60px; height: 60px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4); display: inline-flex; align-items: center; justify-content: center;
            font-size: 22px; color: #fff; transition: all 0.3s ease;
        }
        .split-panel:hover .action-circle-btn { background-color: #f15a24; border-color: #f15a24; transform: scale(1.1); box-shadow: 0 0 20px rgba(241, 90, 36, 0.6); }

        .main-top-logo { position: absolute; top: 30px; left: 40px; z-index: 100; color: #fff; font-weight: bold; font-size: 16px; display: flex; align-items: center; }
        .main-top-logo .logo-badge { background-color: #f15a24; padding: 2px 8px; border-radius: 4px; margin-right: 8px; font-size: 13px; }

        .split-panel-left:hover ~ .bg-wrapper { transform: scale(1.03) translateX(10px); }
        .split-panel-right:hover ~ .bg-wrapper { transform: scale(1.03) translateX(-10px); }
    </style>
</head>
<body>

    

    <div class="split-container">
        <div class="divider"></div>
        
        <a href="/step1" class="split-panel split-panel-left">
            <div class="panel-content">
                <div class="hover-reveal-box">
                    <div class="panel-title"><i class="bi bi-palette me-2"></i>행사 기획</div>
                    <p class="panel-desc">새로운 행사를 개설하고 장소 스케일링 필터를 설정합니다.</p>
                    <div class="action-circle-btn"><i class="bi bi-arrow-right-short"></i></div>
                </div>
            </div>
        </a>

        <a href="/login" class="split-panel split-panel-right">
            <div class="panel-content">
                <div class="hover-reveal-box">
                    <div class="panel-title"><i class="bi bi-sliders me-2"></i>행사 관리</div>
                    <p class="panel-desc">현장 관리자 데스크 및 실시간 참석 데이터 모니터링 세션으로 이동합니다.</p>
                    <div class="action-circle-btn"><i class="bi bi-arrow-right-short"></i></div>
                </div>
            </div>
        </a>

        <div class="bg-wrapper"></div>
    </div>

</body>
</html>
